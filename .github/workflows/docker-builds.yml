name: Docker Builds CI

on:
  push:
    branches:
      - main
    paths:
      - "apps/**/Dockerfile"
      - "apps/**/package.json"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/docker-builds.yml"
  pull_request:
    branches:
      - main
    paths:
      - "apps/**/Dockerfile"
      - "apps/**/package.json"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/docker-builds.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-web-apps:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [pazaak-world, holocron-web, hk86-web]
        include:
          - app: pazaak-world
            dockerfile: apps/pazaak-world/Dockerfile
            image: pazaak-world-preview
            port: 5173
          - app: holocron-web
            dockerfile: apps/holocron-web/Dockerfile
            image: holocron-web-preview
            port: 5174
          - app: hk86-web
            dockerfile: apps/hk86-web/Dockerfile
            image: hk86-web-preview
            port: 5175
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ACTIONS_SUBMODULES_TOKEN || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image - ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.image }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test container startup - ${{ matrix.app }}
        run: |
          docker run --rm -d --name ${{ matrix.app }}-test -e PORT=${{ matrix.port }} -p ${{ matrix.port }}:${{ matrix.port }} ${{ matrix.image }}:test
          sleep 3
          if docker logs ${{ matrix.app }}-test | grep -E "Local:|Network:|listening|started|ready"; then
            echo "✓ Server started successfully"
          else
            echo "Server startup output:"
            docker logs ${{ matrix.app }}-test
            docker kill ${{ matrix.app }}-test || true
            exit 1
          fi
          docker kill ${{ matrix.app }}-test || true

  build-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [pazaak-bot, trask-bot, hk-bot, trask-http-server, ingest-worker]
        include:
          - service: pazaak-bot
            dockerfile: apps/pazaak-bot/Dockerfile
            image: pazaak-bot-service
          - service: trask-bot
            dockerfile: apps/trask-bot/Dockerfile
            image: trask-bot-service
          - service: hk-bot
            dockerfile: apps/hk-bot/Dockerfile
            image: hk-bot-service
          - service: trask-http-server
            dockerfile: apps/trask-http-server/Dockerfile
            image: trask-http-server-service
          - service: ingest-worker
            dockerfile: apps/ingest-worker/Dockerfile
            image: ingest-worker-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ACTIONS_SUBMODULES_TOKEN || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image - ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.image }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image built successfully - ${{ matrix.service }}
        run: |
          docker image inspect ${{ matrix.image }}:test >/dev/null
          echo "✓ Docker image built successfully"

  build-special:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [pazaak-nakama]
        include:
          - service: pazaak-nakama
            dockerfile: apps/pazaak-nakama/Dockerfile
            image: pazaak-nakama-builder
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ACTIONS_SUBMODULES_TOKEN || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image - ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.image }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image and check Nakama modules - ${{ matrix.service }}
        run: |
          docker image inspect ${{ matrix.image }}:test >/dev/null
          docker run --rm ${{ matrix.image }}:test ls -lh /app/dist 2>&1 || true
          echo "✓ Nakama module bundle verified"

  summary:
    runs-on: ubuntu-latest
    needs: [build-web-apps, build-services, build-special]
    if: always()
    steps:
      - name: Check build results
        run: |
          if [ "${{ needs.build-web-apps.result }}" = "failure" ] || [ "${{ needs.build-services.result }}" = "failure" ] || [ "${{ needs.build-special.result }}" = "failure" ]; then
            echo "❌ One or more Docker builds failed"
            exit 1
          fi
          echo "✅ All Docker builds passed successfully!"
